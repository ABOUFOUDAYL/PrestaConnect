<svg width="400" height="160" viewBox="0 0 400 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>PrestaConnect Logo</title>
  <desc>Logo officiel PrestaConnect - plateforme SaaS de mise en relation artisans et clients</desc>

  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Cercle principal -->
  <circle cx="80" cy="80" r="68" fill="url(#circleGrad)"/>

  <!-- Anneau intérieur -->
  <circle cx="80" cy="80" r="54" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>

  <!-- Initiales PC -->
  <text x="80" y="68" font-family="Georgia, serif" font-size="26" font-weight="700" fill="white" text-anchor="middle">PC</text>

  <!-- Ligne décorative -->
  <line x1="57" y1="78" x2="103" y2="78" stroke="white" stroke-width="1" opacity="0.5"/>

  <!-- Sous-texte dans cercle -->
  <text x="80" y="96" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.9">CONNECT</text>

  <!-- Points décoratifs -->
  <circle cx="80" cy="19" r="4" fill="white" opacity="0.6"/>
  <circle cx="80" cy="141" r="4" fill="white" opacity="0.6"/>
  <circle cx="21" cy="50" r="3" fill="white" opacity="0.4"/>
  <circle cx="139" cy="110" r="3" fill="white" opacity="0.4"/>

  <!-- Texte Presta -->
  <text x="165" y="68" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#1e293b">Presta</text>

  <!-- Texte Connect -->
  <text x="165" y="106" font-family="Georgia, serif" font-size="34" font-weight="700" fill="url(#textGrad)">Connect</text>

  <!-- Ligne accent -->
  <rect x="165" y="114" width="220" height="2" rx="1" fill="url(#textGrad)"/>

  <!-- Tagline -->
  <text x="165" y="132" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="2">LA PLATEFORME DES ARTISANS</text>

</svg>
